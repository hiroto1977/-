name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Single-job CI to minimize GitHub Actions minutes: one runner startup +
# one checkout + one setup-node + one `npm ci`, instead of paying that
# fixed overhead 3x across separate jobs. Gates run sequentially and fail
# fast. Per-group granularity was traded for minute efficiency (free-tier
# friendly); re-split into parallel jobs if richer triage is needed and
# minutes are no longer constrained. See docs/BROWSER_REDESIGN.md.
jobs:
  ci:
    name: ci (typecheck + verify + lint + test + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci

      # quality: typecheck + arch/verify + lint
      - run: npm run typecheck
      - run: npm run verify:arch
      - run: npm run lint:forbidden
      - run: npm run lint:imports
      - run: npm run lint:docs
      - run: npm run lint:test-coverage
      - run: npm run verify:orchestration
      - run: npm run lint

      # test: full suite + main-process coverage
      - run: npm test
      - run: npm run test:cov

      # build: web build already runs `tsc -b && vite build` then inlines,
      # so it is a superset of build:renderer — no need to build twice.
      - run: npm run build:web
      - name: Verify standalone.html size
        run: |
          if [ ! -f dist/standalone.html ]; then
            echo "standalone.html not generated" >&2
            exit 1
          fi
          SIZE=$(stat -c%s dist/standalone.html)
          echo "standalone.html size: $SIZE bytes"
          if [ "$SIZE" -lt 100000 ]; then
            echo "standalone.html is suspiciously small" >&2
            exit 1
          fi
