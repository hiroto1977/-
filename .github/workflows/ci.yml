name: ci

on:
  push:
    branches:
      - main
      - 'claude/**'
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck + test + build (renderer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Debug — env info (diagnose intermittent CI failures)
        run: |
          echo "=== Node / npm versions ==="
          node --version
          npm --version
          echo "=== System info ==="
          nproc || echo "no nproc"
          free -h || echo "no free"
          uname -a
          echo "=== Disk ==="
          df -h .

      - name: Typecheck
        run: npm run typecheck

      - name: Verify architecture doc references + live metrics
        run: npm run verify:arch

      - name: Lint forbidden patterns (no eval, dangerouslySetInnerHTML, etc.)
        run: npm run lint:forbidden

      - name: Check import boundaries (renderer/preload/main isolation)
        run: npm run lint:imports

      - name: Cross-doc fact consistency
        run: npm run lint:docs

      - name: Lint test coverage discipline (every service + action has tests)
        run: npm run lint:test-coverage

      - name: Test
        run: npm test

      - name: Coverage (clients only — Electron-bound modules excluded)
        run: npm run test:cov

      - name: Upload coverage summary
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-summary
          path: coverage/coverage-summary.json
          retention-days: 30

      - name: Build renderer + main + preload
        run: npm run build:renderer
