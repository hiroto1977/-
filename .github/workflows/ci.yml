name: ci

on:
  push:
    branches:
      - main
      - 'claude/**'
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck + test + build (renderer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Verify architecture doc references + live metrics
        run: npm run verify:arch

      - name: Lint forbidden patterns (no eval, dangerouslySetInnerHTML, etc.)
        run: npm run lint:forbidden

      - name: Check import boundaries (renderer/preload/main isolation)
        run: npm run lint:imports

      - name: Cross-doc fact consistency
        run: npm run lint:docs

      - name: Lint test coverage discipline (every service + action has tests)
        run: npm run lint:test-coverage

      - name: Test
        run: npm test

      - name: Coverage (clients only — Electron-bound modules excluded)
        run: npm run test:cov

      - name: Upload coverage summary
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-summary
          path: coverage/coverage-summary.json
          retention-days: 30

      - name: Build renderer + main + preload
        run: npm run build:renderer

      - name: Build browser standalone (single HTML)
        run: npm run build:web

      - name: Verify standalone.html size
        run: |
          if [ ! -f dist/standalone.html ]; then
            echo "standalone.html not generated" >&2
            exit 1
          fi
          SIZE=$(stat -c%s dist/standalone.html)
          echo "standalone.html size: $SIZE bytes"
          # Fail if it's suspiciously small (< 100 KB) — means inline-html missed something
          if [ $SIZE -lt 100000 ]; then
            echo "standalone.html is suspiciously small" >&2
            exit 1
          fi

      - name: ESLint
        run: npm run lint
