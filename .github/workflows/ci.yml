name: ci

on:
  push:
    branches:
      - main
      - 'claude/**'
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- Stage 1: build the dependency cache once. -------------------
  install:
    name: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Env info
        run: |
          node --version
          npm --version
          nproc || true
          free -h || true
          uname -a

  # --- Each remaining job runs independently so a failure tells us
  # exactly WHICH step is broken via the check_runs API. ----------
  typecheck:
    name: typecheck
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck

  verify-arch:
    name: verify:arch
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run verify:arch
      - run: npm run lint:forbidden
      - run: npm run lint:imports
      - run: npm run lint:docs
      - run: npm run lint:test-coverage

  test:
    name: test
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm test

  test-cov:
    name: test:cov
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:cov
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-summary
          path: coverage/coverage-summary.json
          retention-days: 30

  build:
    name: build (renderer + web)
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build:renderer
      - run: npm run build:web
      - name: Verify standalone.html size
        run: |
          if [ ! -f dist/standalone.html ]; then
            echo "standalone.html not generated" >&2
            exit 1
          fi
          SIZE=$(stat -c%s dist/standalone.html)
          echo "standalone.html size: $SIZE bytes"
          if [ $SIZE -lt 100000 ]; then
            echo "standalone.html is suspiciously small" >&2
            exit 1
          fi

  lint:
    name: eslint
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
