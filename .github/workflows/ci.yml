name: ci

on:
  push:
    branches:
      - main
      - 'claude/**'
  pull_request:
    branches:
      - main

# Cancel an in-flight run for the same branch when a newer commit lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck + test + build (renderer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      # build:renderer covers the full TS → JS pipeline for the renderer +
      # main + preload bundles. Skipping electron-builder here — that's
      # exercised by release.yml on tag pushes (slow + needs more setup).
      - name: Build renderer + main + preload
        run: npm run build:renderer
