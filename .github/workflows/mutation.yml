name: mutation

# Mutation testing takes ~2 minutes and is overkill for every PR. Run
# it weekly (so regressions surface within 7 days), on demand
# (workflow_dispatch), and whenever the test infra itself changes.

on:
  schedule:
    - cron: '0 18 * * 0'  # 03:00 JST every Monday
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'stryker.config.json'
      - 'vitest.config.ts'
      - 'src/main/clients/**'
      - 'src/main/oauth.ts'

permissions:
  contents: read

jobs:
  mutate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Restore Stryker incremental cache
        uses: actions/cache@v4
        with:
          path: .stryker-incremental.json
          key: stryker-${{ github.ref_name }}
          restore-keys: |
            stryker-main

      - name: Run mutation testing
        run: npm run mutate

      - name: Save Stryker JSON report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mutation-report
          path: reports/mutation/mutation.json
          retention-days: 90

      - name: Triage top survivors
        if: always()
        run: npm run mutate:triage -- --top=30
