name: pages

# GitHub Pages へ standalone ビルドを公開する。
# 公開後は https://<owner>.github.io/<repo>/ をクリックするだけで
# アプリがブラウザで開く (ダウンロード・ファイル操作は一切不要)。
#
# 有効化 (オーナーが一度だけ): リポジトリ Settings → Pages →
#   "Build and deployment" の Source を "GitHub Actions" に設定。
# 以後 main への push で自動公開される。

on:
  push:
    branches: [main]
  workflow_dispatch: # 手動実行も可

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build:web
      # 軽量ランディング (services.ts から自動生成・自己検証付き) を生成
      - run: npm run build:landing
      # カウンセリング会話デモ (実エンジンをバンドル・自己検証付き) を生成
      - run: npm run build:demo
      # 合議デモ (実エンジン同梱・自己検証付き) を生成
      - run: npm run build:deliberation-demo
      # ルート = 軽量ランディング、フル版 = /app.html、OGP = /og.png
      - name: Prepare site
        run: |
          mkdir -p _site
          cp dist/landing.html _site/index.html
          cp dist/standalone.html _site/app.html
          cp dist/standalone.html _site/standalone.html
          cp dist/counseling-demo.html _site/counseling-demo.html
          cp dist/deliberation-demo.html _site/deliberation-demo.html
          cp assets/og.png _site/og.png
          # PWA (ホーム画面に追加): manifest / icon / service worker を配置
          cp assets/manifest.webmanifest _site/manifest.webmanifest
          cp assets/icon.svg _site/icon.svg
          cp assets/sw.js _site/sw.js
          touch _site/.nojekyll
      # PWA タグ注入 (公開 HTML のみ。standalone.html 配布物は単一ファイルのまま不変)
      - name: Inject PWA tags
        run: node scripts/inject-pwa.cjs _site/index.html _site/app.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
