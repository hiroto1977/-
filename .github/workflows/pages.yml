name: pages

# GitHub Pages へ standalone ビルドを公開する。
# 公開後は https://<owner>.github.io/<repo>/ をクリックするだけで
# アプリがブラウザで開く (ダウンロード・ファイル操作は一切不要)。
#
# 有効化 (オーナーが一度だけ): リポジトリ Settings → Pages →
#   "Build and deployment" の Source を "GitHub Actions" に設定。
# 以後 main への push で自動公開される。

on:
  push:
    branches: [main]
  workflow_dispatch: # 手動実行も可

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build:web
      # Pages はディレクトリ直下の index.html を配信するので複製する。
      - name: Prepare site
        run: |
          mkdir -p _site
          cp dist/standalone.html _site/index.html
          cp dist/standalone.html _site/standalone.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
